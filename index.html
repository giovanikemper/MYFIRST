<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jogo da Memória</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 520px;
            width: 95%;
        }

        h1 { font-size: 1.8rem; margin-bottom: 6px; }
        .subtitulo { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; }

        .info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: #ccc;
        }

        .info span { font-size: 1.4rem; font-weight: bold; color: white; display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .carta {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            user-select: none;
        }

        .carta:hover:not(.virada):not(.encontrada) {
            background: rgba(255,255,255,0.15);
            border-color: #e94560;
            transform: scale(1.05);
        }

        .carta.virada {
            background: rgba(233, 69, 96, 0.3);
            border-color: #e94560;
        }

        .carta.encontrada {
            background: rgba(74, 222, 128, 0.2);
            border-color: #4ade80;
            cursor: default;
            transform: scale(1.02);
        }

        .carta .frente { display: none; }
        .carta .verso  { display: block; color: #555; font-size: 1.5rem; }

        .carta.virada .frente,
        .carta.encontrada .frente { display: block; }

        .carta.virada .verso,
        .carta.encontrada .verso { display: none; }

        .mensagem {
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 36px;
            margin-bottom: 12px;
            color: #4ade80;
        }

        .btn-novo {
            background: #e94560;
            border: none;
            color: white;
            padding: 10px 28px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-novo:hover { background: #c73652; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 Jogo da Memória</h1>
    <p class="subtitulo">Encontre todos os pares!</p>

    <div class="info">
        <div>Tentativas<span id="tentativas">0</span></div>
        <div>Pares<span id="pares">0/8</span></div>
        <div>Tempo<span id="tempo">0s</span></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="mensagem" id="mensagem"></div>

    <button class="btn-novo" onclick="iniciar()">🔄 Novo Jogo</button>
</div>

<script>
    let cartas = [];
    let viradas = [];
    let pares = 0;
    let tentativas = 0;
    let bloqueado = false;
    let timer = null;
    let segundos = 0;

    function iniciar() {
        fetch('/novo-jogo')
            .then(res => res.json())
            .then(data => {
                cartas = data.cartas;
                viradas = [];
                pares = 0;
                tentativas = 0;
                bloqueado = false;
                segundos = 0;
                clearInterval(timer);

                document.getElementById('tentativas').textContent = 0;
                document.getElementById('pares').textContent = '0/8';
                document.getElementById('tempo').textContent = '0s';
                document.getElementById('mensagem').textContent = '';

                renderizar();

                timer = setInterval(() => {
                    segundos++;
                    document.getElementById('tempo').textContent = segundos + 's';
                }, 1000);
            });
    }

    function renderizar() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        cartas.forEach((emoji, i) => {
            const carta = document.createElement('div');
            carta.className = 'carta';
            carta.dataset.index = i;
            carta.innerHTML = `<span class="frente">${emoji}</span><span class="verso">❓</span>`;
            carta.addEventListener('click', () => virarCarta(i, carta));
            grid.appendChild(carta);
        });
    }

    function virarCarta(index, el) {
        if (bloqueado) return;
        if (el.classList.contains('virada') || el.classList.contains('encontrada')) return;

        el.classList.add('virada');
        viradas.push({ index, el, emoji: cartas[index] });

        if (viradas.length === 2) {
            bloqueado = true;
            tentativas++;
            document.getElementById('tentativas').textContent = tentativas;

            if (viradas[0].emoji === viradas[1].emoji) {
                viradas[0].el.classList.replace('virada', 'encontrada');
                viradas[1].el.classList.replace('virada', 'encontrada');
                pares++;
                document.getElementById('pares').textContent = pares + '/8';
                viradas = [];
                bloqueado = false;

                if (pares === 8) {
                    clearInterval(timer);
                    document.getElementById('mensagem').textContent =
                        `🎉 Parabéns! ${tentativas} tentativas em ${segundos}s`;
                }
            } else {
                setTimeout(() => {
                    viradas[0].el.classList.remove('virada');
                    viradas[1].el.classList.remove('virada');
                    viradas = [];
                    bloqueado = false;
                }, 900);
            }
        }
    }

    iniciar();
</script>
</body>
</html>

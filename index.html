<!DOCTYPE html>
<html>
<head>
    <title>App Insano 😎</title>
    <style>
        body {
            background: black;
            color: #00ff88;
            font-family: monospace;
            text-align: center;
        }

        button {
            padding: 15px;
            margin: 10px;
            font-size: 16px;
            background: #00ff88;
            border: none;
        }

        #gameBtn {
            position: absolute;
        }
    </style>
</head>
<body>

<h1>🔥 App Insano</h1>

<button onclick="show('game')">🎮 Jogo</button>
<button onclick="show('reaction')">⚡ Reação</button>
<button onclick="show('future')">🧠 Futuro</button>

<div id="content"></div>

<script>
function show(type) {
    const c = document.getElementById("content");

    if (type === "game") {
        c.innerHTML = `
            <h2>Fuja do botão 😂</h2>
            <button id="gameBtn">Clique aqui</button>
        `;

        const btn = document.getElementById("gameBtn");

        btn.onmouseover = () => {
            btn.style.left = Math.random()*300 + "px";
            btn.style.top = Math.random()*300 + "px";
        };
    }

    if (type === "reaction") {
        c.innerHTML = `
            <h2>Teste de reação</h2>
            <button onclick="startReaction()">Começar</button>
            <h3 id="result"></h3>
        `;
    }

    if (type === "future") {
        c.innerHTML = `
            <h2>Seu futuro</h2>
            <input id="nome" placeholder="Seu nome">
            <br><br>
            <button onclick="verFuturo()">Ver futuro</button>
            <h3 id="res"></h3>
        `;
    }
}

let startTime;

function startReaction() {
    const res = document.getElementById("result");
    res.innerText = "Espere...";

    setTimeout(() => {
        res.innerText = "CLIQUE AGORA!";
        startTime = Date.now();

        document.onclick = () => {
            const tempo = Date.now() - startTime;
            res.innerText = "Seu tempo: " + tempo + "ms";
            document.onclick = null;
        };
    }, Math.random()*3000 + 1000);
}

function verFuturo() {
    const nome = document.getElementById("nome").value;

    fetch('/futuro')
    .then(r => r.json())
    .then(d => {
        document.getElementById("res").innerText =
            nome + ", " + d.mensagem;
    });
}
</script>

</body>
</html>
